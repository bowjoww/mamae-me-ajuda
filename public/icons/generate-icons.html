<!DOCTYPE html>
<html>
<body>
<h2>Clique nos botões para baixar os ícones e salve na pasta public/icons/</h2>
<canvas id="c192" width="192" height="192"></canvas>
<button onclick="download(192)">Baixar 192x192</button>
<br><br>
<canvas id="c512" width="512" height="512"></canvas>
<button onclick="download(512)">Baixar 512x512</button>
<script>
function draw(size) {
  const c = document.getElementById('c' + size);
  const ctx = c.getContext('2d');
  // Background
  ctx.fillStyle = '#7c3aed';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();
  // Emoji
  ctx.font = size * 0.5 + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📚', size/2, size/2);
}
function download(size) {
  const c = document.getElementById('c' + size);
  const a = document.createElement('a');
  a.download = 'icon-' + size + 'x' + size + '.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
draw(192);
draw(512);
</script>
</body>
</html>
